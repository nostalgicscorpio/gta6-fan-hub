<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GTA VI Fan Hub — Your ultimate destination for Grand Theft Auto VI news, trailers, screenshots, characters, and the interactive Leonida map. Countdown to launch day. Explore Vice City like never before." />
    <meta name="keywords" content="GTA VI, GTA 6, Grand Theft Auto VI, Vice City, Leonida, Rockstar Games, GTA VI release date, GTA VI trailers, GTA VI screenshots, GTA VI characters, Lucia, Jason" />
    <meta name="author" content="GTA VI Fan Hub" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph -->
    <meta property="og:title" content="GTA VI Fan Hub — Countdown, News & Trailers" />
    <meta property="og:description" content="The ultimate unofficial fan destination for everything Grand Theft Auto VI. Latest news, trailers, screenshots, characters, and the interactive Leonida map." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/hero-bg.png" />
    <meta property="og:url" content="%VITE_SITE_URL%" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GTA VI Fan Hub — Countdown, News & Trailers" />
    <meta name="twitter:description" content="The ultimate unofficial fan destination for everything Grand Theft Auto VI." />
    <meta name="twitter:image" content="/images/hero-bg.png" />

    <title>GTA VI Fan Hub — Countdown, News, Trailers & More</title>

    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/images/trailers/hero-bg.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "GTA VI Fan Hub",
      "url": "%VITE_SITE_URL%",
      "description": "The ultimate unofficial fan destination for Grand Theft Auto VI.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "%VITE_SITE_URL%/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
